name: CI - Автоматические тесты

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: checkout code
      uses: actions/checkout@v3
    
    - name: setup Node.js 18
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json
    
    - name: install backend dependencies
      run: |
        cd backend
        npm ci
    
    - name: lint backend (ESLint)
      run: |
        cd backend
        npm run lint || echo "linting warnings found"
      continue-on-error: true
    
    - name: run backend tests
      run: |
        cd backend
        npm run test || echo "no tests configured"
      continue-on-error: true

  frontend-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: checkout code
      uses: actions/checkout@v3
    
    - name: setup Node.js 18
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: install frontend dependencies
      run: |
        cd frontend
        npm ci
    
    - name: run frontend tests
      run: |
        cd frontend
        npm test -- --coverage --watchAll=false --passWithNoTests
      continue-on-error: true
    
    - name: build frontend
      run: |
        cd frontend
        npm run build

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - name: checkout code
      uses: actions/checkout@v3
    
    - name: setup Node.js 18
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: check for vulnerabilities (back)
      run: |
        cd backend
        npm install
        npm audit --production || true
    
    - name: check for vulnerabilities (front)
      run: |
        cd frontend
        npm install
        npm audit --production || true

  ci-status:
    needs: [backend-tests, frontend-tests, code-quality]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: CI pipeline completed
      run: |
        echo "gitHub actions CI pipeline completed"
        echo "all jobs finished"
